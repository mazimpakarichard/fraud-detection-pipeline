name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install ruff mypy

      - name: Run Ruff linter
        run: ruff check src/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fraud
          POSTGRES_PASSWORD: fraud_password
          POSTGRES_DB: fraud_detection
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Initialize database schema
        env:
          PGPASSWORD: fraud_password
        run: |
          psql -h localhost -U fraud -d fraud_detection -f sql/001_schema.sql

      - name: Run tests with coverage
        env:
          FRAUD_DB_HOST: localhost
          FRAUD_DB_PORT: 5432
          FRAUD_DB_NAME: fraud_detection
          FRAUD_DB_USER: fraud
          FRAUD_DB_PASSWORD: fraud_password
        run: |
          pytest tests/ -v --cov=fraud_detection --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit safety

      - name: Run Bandit security scan
        run: bandit -r src/fraud_detection -ll

      - name: Check dependencies for vulnerabilities
        run: pip install -e . && safety check
        continue-on-error: true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: fraud-detection:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d postgres
          sleep 10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        env:
          FRAUD_DB_HOST: localhost
          FRAUD_DB_PORT: 5432
          FRAUD_DB_NAME: fraud_detection
          FRAUD_DB_USER: fraud
          FRAUD_DB_PASSWORD: fraud_password
          FRAUD_USE_SYNTHETIC_DATA: "true"
          FRAUD_SYNTHETIC_ROWS: "10000"
        run: |
          pytest tests/integration/ -v --timeout=300

      - name: Stop services
        if: always()
        run: docker compose down -v
