stages:
  - lint
  - test
  - security
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POSTGRES_USER: fraud
  POSTGRES_PASSWORD: fraud_password
  POSTGRES_DB: fraud_detection

cache:
  paths:
    - .cache/pip/

# Lint and format check
lint:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install ruff mypy
    - ruff check src/ tests/
    - ruff format --check src/ tests/
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# Unit tests with coverage
test:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  services:
    - name: postgres:15-alpine
      alias: postgres
  variables:
    FRAUD_DB_HOST: postgres
    FRAUD_DB_PORT: "5432"
    FRAUD_DB_NAME: fraud_detection
    FRAUD_DB_USER: fraud
    FRAUD_DB_PASSWORD: fraud_password
  before_script:
    - apt-get update && apt-get install -y postgresql-client
    - pip install -e ".[dev]"
    - PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U fraud -d fraud_detection -f sql/001_schema.sql
  script:
    - pytest tests/ -v --cov=fraud_detection --cov-report=xml --cov-report=term-missing
  coverage: '/TOTAL.*\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# Security scanning
security:
  stage: security
  image: python:${PYTHON_VERSION}-slim
  script:
    - pip install bandit safety
    - bandit -r src/fraud_detection -ll -f json -o bandit-report.json
    - pip install -e . && safety check --json > safety-report.json || true
  artifacts:
    paths:
      - bandit-report.json
      - safety-report.json
    when: always
  allow_failure: true
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == "main"

# Build Docker image
build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-airflow -f Dockerfile.airflow .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA-airflow
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"

# Build latest tag
build:latest:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# Deploy to staging
deploy:staging:
  stage: deploy
  image: alpine:latest
  environment:
    name: staging
    url: https://fraud-staging.example.com
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying to staging environment..."
    # Add deployment commands here (kubectl, helm, etc.)
    - echo "Deployment complete"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  when: manual

# Deploy to production
deploy:production:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: https://fraud.example.com
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying to production environment..."
    # Add deployment commands here (kubectl, helm, etc.)
    - echo "Deployment complete"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual
